<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>{{ comic.title }} - 阅读</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: #0a0a0a;
            color: #ccc;
            height: 100%;
            width: 100%;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        #progressWrap {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 12px;
            z-index: 102;
            cursor: pointer;
        }
        #progressBar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 0%;
            background: #6395F5;
            transition: width 0.15s ease, opacity 0.3s;
        }
        #progressBar.dim { opacity: 0.3; }

        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 80%, transparent 100%);
            padding: 8px 12px;
            padding-top: max(14px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.3s;
        }
        #toolbar.hidden { opacity: 0; pointer-events: none; }

        #toolbar .btn-icon {
            color: #aaa;
            background: none;
            border: none;
            font-size: 1.2rem;
            padding: 4px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: color 0.2s;
        }
        #toolbar .btn-icon:hover { color: #6395F5; }

        #toolbar .title {
            color: #6395F5;
            font-weight: bold;
            font-size: 0.9rem;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        #toolbar .mode-btn {
            color: #888;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3px 10px;
            border-radius: 14px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        #toolbar .mode-btn:hover {
            border-color: #6395F5;
            color: #6395F5;
        }
        #toolbar .mode-btn.active {
            background: rgba(99,149,245,0.2);
            border-color: #6395F5;
            color: #6395F5;
        }

        #container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .mode-vertical #container {
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }
        .mode-vertical #container::-webkit-scrollbar { display: none; }

        .mode-horizontal #container {
            overflow: hidden;
        }

        .page-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .mode-vertical .page-slot {
            min-height: 100vh;
            min-height: 100dvh;
        }

        .mode-horizontal .page-slot {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .mode-horizontal .page-slot.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .page-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
        }
        .page-placeholder.hidden { display: none; }

        .mode-vertical .page-placeholder {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .mode-horizontal .page-placeholder {
            width: 100%;
            height: 100%;
        }

        .ph-svg {
            max-width: 90%;
            max-height: 85%;
            width: auto;
            height: auto;
        }

        .page-img {
            display: block;
            object-fit: contain;
        }

        .mode-vertical .page-img {
            max-width: 100%;
            max-height: 100dvh;
        }

        .mode-horizontal .page-img {
            max-width: 100vw;
            max-height: 100dvh;
        }

        .page-img.placeholder-img {
            opacity: 0.3;
            filter: blur(8px);
            transition: opacity 0.3s, filter 0.3s;
        }

        #bottombar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 80%, transparent 100%);
            padding: 8px 12px 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.3s;
        }
        #bottombar.hidden { opacity: 0; pointer-events: none; }

        .nav-btn {
            color: #6395F5;
            background: rgba(99,149,245,0.12);
            border: 1px solid rgba(99,149,245,0.3);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(99,149,245,0.25); }
        .nav-btn:active { background: #6395F5; color: #fff; }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: default;
            pointer-events: none;
        }

        .slider-wrap {
            flex: 1;
            display: flex;
            align-items: center;
        }

        #pageSlider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(99,149,245,0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        #pageSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #6395F5;
            border-radius: 50%;
            cursor: pointer;
        }
        #pageSlider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #6395F5;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        #pageInfo {
            color: #aaa;
            font-size: 0.8rem;
            white-space: nowrap;
            min-width: 55px;
            text-align: center;
            user-select: text;
            -webkit-user-select: text;
        }

        #nextHint {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99;
            background: rgba(99,149,245,0.9);
            color: #fff;
            padding: 6px 20px;
            border-radius: 18px 18px 0 0;
            font-size: 0.78rem;
            cursor: pointer;
            display: none;
            white-space: nowrap;
            transition: opacity 0.3s;
        }
        #nextHint.visible { display: block; }
        #nextHint.hidden { opacity: 0; pointer-events: none; }
        #nextHint .bounce {
            display: inline-block;
            margin-left: 4px;
            animation: bounceDown 0.6s infinite;
        }

        @keyframes bounceDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(3px); }
        }

        @media (max-width: 767px) {
            #toolbar { padding: 6px 10px; padding-top: max(12px, env(safe-area-inset-top)); }
            #toolbar .btn-icon { font-size: 1.1rem; padding: 3px 6px; }
            #toolbar .title { font-size: 0.82rem; }
            #toolbar .mode-btn { font-size: 0.7rem; padding: 2px 8px; }
            #bottombar { padding: 6px 10px 14px; gap: 6px; }
            .nav-btn { width: 32px; height: 32px; }
            #pageInfo { font-size: 0.72rem; min-width: 48px; }
        }
    </style>
</head>
<body class="mode-vertical">
    <div id="progressWrap">
        <div id="progressBar"></div>
    </div>

    <div id="toolbar">
        <a href="{{ url_for('main.detail', comic_id=comic.id) }}" class="btn-icon" title="返回">
            <i class="bi bi-arrow-left"></i>
        </a>
        <span class="title">{{ comic.title }}</span>
        <button class="mode-btn active" id="btnVertical" onclick="setMode('vertical')">竖向</button>
        <button class="mode-btn" id="btnHorizontal" onclick="setMode('horizontal')">横向</button>
    </div>

    <div id="container">
        {% for page in pages %}
        <div class="page-slot" data-page="{{ loop.index }}">
            <div class="page-placeholder" id="ph-{{ loop.index }}">
                <svg class="ph-svg" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="116" height="156" rx="6" fill="#141420" stroke="#6395F5" stroke-width="1" stroke-dasharray="4,4" stroke-opacity="0.4"/>
                    <rect x="18" y="22" width="84" height="12" rx="3" fill="#2a2a3a"/>
                    <rect x="18" y="42" width="64" height="10" rx="3" fill="#2a2a3a"/>
                    <rect x="18" y="60" width="72" height="10" rx="3" fill="#2a2a3a"/>
                    <rect x="60" y="82" width="48" height="52" rx="4" fill="#6395F5" fill-opacity="0.15"/>
                    <text x="60" y="132" text-anchor="middle" font-size="11" fill="#6395F5" fill-opacity="0.5">第{{ loop.index }}页</text>
                </svg>
            </div>
            <img class="page-img" data-page="{{ loop.index }}"
                 data-src="{{ url_for('main.serve_page', comic_id=comic.id, page_filename=page) }}"
                 alt="第{{ loop.index }}页"
                 onload="onImgLoad(this)" onerror="onImgError(this)">
        </div>
        {% endfor %}
    </div>

    <div id="bottombar">
        <button class="nav-btn" id="btnPrev" onclick="prevPage()" title="上一页">
            <i class="bi bi-chevron-left"></i>
        </button>
        <div class="slider-wrap">
            <input type="range" id="pageSlider" min="1" max="{{ total }}" value="1"
                   oninput="seekToPage(this.value)">
        </div>
        <span id="pageInfo">1 / {{ total }}</span>
        <button class="nav-btn" id="btnNext" onclick="nextPage()" title="下一页">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>

    {% if next_comic_id %}
    <div id="nextHint" class="visible" onclick="location.href='{{ url_for('main.reader', comic_id=next_comic_id) }}'">
        下一话: {{ next_comic_title }} <span class="bounce"><i class="bi bi-chevron-down"></i></span>
    </div>
    {% endif %}

    <script>
    const TOTAL = {{ total }};
    const START_PAGE = {{ start_page }};
    const PRELOAD_RANGE = 3;

    let currentMode = localStorage.getItem('reader_mode') || 'vertical';
    let currentPage = 1;
    let hideTimer = null;
    let scrollTimer = null;
    let saveTimer = null;
    let programmaticScroll = false;
    let programmaticTimer = null;

    const body = document.body;
    const container = document.getElementById('container');
    const toolbar = document.getElementById('toolbar');
    const bottombar = document.getElementById('bottombar');
    const progressBar = document.getElementById('progressBar');
    const progressWrap = document.getElementById('progressWrap');
    const pageInfo = document.getElementById('pageInfo');
    const pageSlider = document.getElementById('pageSlider');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const nextHint = document.getElementById('nextHint');
    const images = document.querySelectorAll('#container .page-img');
    const slots = document.querySelectorAll('#container .page-slot');

    function onImgLoad(img) {
        img.classList.add('loaded');
        const n = img.dataset.page;
        const ph = document.getElementById('ph-' + n);
        if (ph) ph.classList.add('hidden');
    }

    function onImgError(img) {
        img.remove();
        const n = img.dataset.page;
        const ph = document.getElementById('ph-' + n);
        if (ph) ph.classList.add('hidden');
    }

    function loadImg(img) {
        if (!img) return;
        if (img.classList.contains('loaded')) return;
        if (img.classList.contains('placeholder-img')) {
            img.classList.remove('placeholder-img');
        }
        var n = img.dataset.page;
        var ph = document.getElementById('ph-' + n);
        if (ph) ph.classList.remove('hidden');
        if (img.dataset.src) {
            img.src = img.dataset.src;
        }
    }

    function eagerPreloadNearViewport() {
        var vh = container.clientHeight;
        var margin = vh;

        slots.forEach(function(slot, idx) {
            var r = slot.getBoundingClientRect();
            if (r.bottom >= -margin && r.top <= vh + margin) {
                var img = images[idx];
                if (img) loadImg(img);
            }
        });
    }

    function unloadImg(img) {
        if (!img) return;
        if (img.classList.contains('placeholder-img')) return;
        if (!img.dataset.src) return;
        img.classList.add('placeholder-img');
        img.removeAttribute('src');
        img.classList.remove('loaded');
        var n = img.dataset.page;
        var ph = document.getElementById('ph-' + n);
        if (ph) ph.classList.remove('hidden');
    }

    function preloadAround(n) {
        var lo = Math.max(1, n - PRELOAD_RANGE);
        var hi = Math.min(TOTAL, n + PRELOAD_RANGE);

        images.forEach(function(img) {
            var p = parseInt(img.dataset.page);
            if (p >= lo && p <= hi) {
                loadImg(img);
            } else {
                unloadImg(img);
            }
        });
    }

    function updateProgressBar() {
        var pct = TOTAL > 0 ? (currentPage / TOTAL * 100) : 0;
        progressBar.style.width = pct + '%';
    }

    function updateIndicator() {
        pageInfo.textContent = currentPage + ' / ' + TOTAL;
        pageSlider.value = currentPage;
    }

    function updateNavButtons() {
        btnPrev.disabled = currentPage <= 1;
        btnNext.disabled = currentPage >= TOTAL;
    }

    function updateNextHint() {
        if (!nextHint) return;
        if (currentPage >= TOTAL) {
            nextHint.classList.add('visible');
            nextHint.classList.remove('hidden');
        } else {
            nextHint.classList.remove('visible');
        }
    }

    function refreshUI() {
        updateProgressBar();
        updateIndicator();
        updateNavButtons();
        updateNextHint();
    }

    function goToPage(n, instant) {
        n = Math.max(1, Math.min(TOTAL, n));
        if (n === currentPage && currentMode === 'horizontal') return;

        var prevPage = currentPage;
        currentPage = n;
        refreshUI();

        if (currentMode === 'vertical') {
            var slot = slots[n - 1];
            if (!slot) return;

            preloadAround(n);

            programmaticScroll = true;
            clearTimeout(programmaticTimer);

            var behavior = instant ? 'instant' : 'smooth';
            slot.scrollIntoView({ behavior: behavior, block: 'start' });

            programmaticTimer = setTimeout(function() {
                programmaticScroll = false;
            }, instant ? 100 : 600);
        } else {
            var oldSlot = slots[prevPage - 1];
            var newSlot = slots[n - 1];
            if (oldSlot) oldSlot.classList.remove('active');
            if (newSlot) {
                preloadAround(n);
                newSlot.classList.add('active');
            }
        }

        scheduleSave();
    }

    function nextPage() {
        if (currentPage >= TOTAL) return;
        if (currentMode === 'vertical') {
            goToPage(currentPage + 1);
        } else {
            goToPage(currentPage + 1, true);
        }
    }

    function prevPage() {
        if (currentPage <= 1) return;
        if (currentMode === 'vertical') {
            goToPage(currentPage - 1);
        } else {
            goToPage(currentPage - 1, true);
        }
    }

    function seekToPage(val) {
        goToPage(parseInt(val), true);
    }

    function setMode(mode) {
        currentMode = mode;
        localStorage.setItem('reader_mode', mode);

        body.className = 'mode-' + mode;
        document.getElementById('btnVertical').classList.toggle('active', mode === 'vertical');
        document.getElementById('btnHorizontal').classList.toggle('active', mode === 'horizontal');

        var savedPage = currentPage;

        if (mode === 'vertical') {
            btnPrev.style.display = '';
            btnNext.style.display = '';

            preloadAround(savedPage);

            programmaticScroll = true;
            var slot = slots[savedPage - 1];
            if (slot) {
                slot.scrollIntoView({ behavior: 'instant', block: 'start' });
            }
            setTimeout(function() { programmaticScroll = false; }, 200);

        } else {
            btnPrev.style.display = '';
            btnNext.style.display = '';

            slots.forEach(function(slot) {
                var p = parseInt(slot.dataset.page);
                if (p === savedPage) {
                    slot.classList.add('active');
                } else {
                    slot.classList.remove('active');
                }
            });

            preloadAround(savedPage);
        }

        refreshUI();
        showUI();
    }

    function detectCurrentPageFromScroll() {
        if (programmaticScroll) return;

        var bestPage = currentPage;
        var bestRatio = 0;
        var vh = container.clientHeight;

        slots.forEach(function(slot) {
            var r = slot.getBoundingClientRect();
            var visibleTop = Math.max(r.top, 0);
            var visibleBottom = Math.min(r.bottom, vh);
            var visibleHeight = Math.max(0, visibleBottom - visibleTop);
            var ratio = r.height > 0 ? visibleHeight / r.height : 0;

            if (ratio > bestRatio) {
                bestRatio = ratio;
                bestPage = parseInt(slot.dataset.page);
            }
        });

        if (bestPage !== currentPage && bestRatio > 0.2) {
            currentPage = bestPage;
            refreshUI();
            preloadAround(bestPage);
            scheduleSave();
        }
    }

    container.addEventListener('scroll', function() {
        showUI();

        if (currentMode !== 'vertical') return;

        eagerPreloadNearViewport();

        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(detectCurrentPageFromScroll, 150);
    }, { passive: true });

    function saveProgress() {
        var blob = new Blob(
            [JSON.stringify({last_page: currentPage, total_pages: TOTAL})],
            {type: 'application/json'}
        );
        navigator.sendBeacon('/api/comics/{{ comic.id }}/progress', blob);
    }

    function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveProgress, 2000);
    }

    function showUI() {
        toolbar.classList.remove('hidden');
        bottombar.classList.remove('hidden');
        progressBar.classList.remove('dim');
        if (nextHint && currentPage >= TOTAL) {
            nextHint.classList.remove('hidden');
        }
        clearTimeout(hideTimer);
        hideTimer = setTimeout(hideUI, 3000);
    }

    function hideUI() {
        toolbar.classList.add('hidden');
        bottombar.classList.add('hidden');
        progressBar.classList.add('dim');
        if (nextHint) {
            nextHint.classList.add('hidden');
        }
    }

    progressWrap.addEventListener('click', function(e) {
        var ratio = e.clientX / progressWrap.offsetWidth;
        var targetPage = Math.max(1, Math.min(TOTAL, Math.round(ratio * TOTAL)));
        goToPage(targetPage, true);
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            prevPage();
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
            e.preventDefault();
            nextPage();
        } else if (e.key === 'Home') {
            e.preventDefault();
            goToPage(1, true);
        } else if (e.key === 'End') {
            e.preventDefault();
            goToPage(TOTAL, true);
        } else if (e.key === 'Escape') {
            window.location.href = '{{ url_for("main.detail", comic_id=comic.id) }}';
        }
    });

    document.addEventListener('mousemove', function() {
        showUI();
    });

    document.addEventListener('touchstart', function() {
        showUI();
    }, { passive: true });

    window.addEventListener('beforeunload', function() {
        var blob = new Blob(
            [JSON.stringify({last_page: currentPage, total_pages: TOTAL})],
            {type: 'application/json'}
        );
        navigator.sendBeacon('/api/comics/{{ comic.id }}/progress', blob);
    });

    (function init() {
        if (currentMode !== 'vertical' && currentMode !== 'horizontal') {
            currentMode = 'vertical';
        }
        setMode(currentMode);

        if (START_PAGE > 1) {
            currentPage = START_PAGE;
            refreshUI();
            setTimeout(function() {
                goToPage(START_PAGE, true);
            }, 200);
        } else {
            currentPage = 1;
            refreshUI();
            preloadAround(1);
        }

        showUI();
    })();
    </script>
</body>
</html>
